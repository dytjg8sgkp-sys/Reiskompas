<!doctype html><html lang='nl'><head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>ReisKompas 2.2</title>
<link rel='stylesheet' href='css/style.css'></head>
<body>
<header><h1>🏕️ ReisKompas 2.2</h1><p>Camping Navigator</p></header>
<div class='layout'>
<aside class='panel'>
<h2>Navigatie</h2>
<input id='place' placeholder='Kampeerplaats'>
<button id='save'>Kampeerplaats opslaan</button>
<h3>Bestemmingen</h3>
<div class='list'>
<button data-d='Receptie'>📍 Receptie</button>
<button data-d='Garden Pool'>🏊 Garden Pool</button>
<button data-d='Splash Pool'>💦 Splash Pool</button>
<button data-d='Supermarkt'>🛒 Supermarkt</button>
<button data-d='La Terrassa'>🍽️ La Terrassa</button>
<button data-d='Strand'>🏖️ Strand</button>
</div>
<p><b>Bestemming:</b> <span id='dest'>-</span></p>
</aside>
<main class='viewer'>
<iframe src='docs/Campingkaart_HD.pdf'></iframe>
<p class='hint'>Volgende stap: vervang de PDF door een hoge resolutie afbeelding voor pinch-to-zoom en klikbare hotspots.</p>
</main>
</div>
<script src='js/app.js'></script>
</body></html>
