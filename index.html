<!doctype html><html lang='nl'><head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>ReisKompas v101</title>
<link rel="stylesheet" href="css/style.css"></head><body>
<header><h1>🏕️ ReisKompas v101</h1><p>Interactieve kaart – prototype</p></header>

<div class="toolbar">
<button data-loc="Receptie">Receptie</button>
<button data-loc="Garden Pool">Garden Pool</button>
<button data-loc="Splash Pool">Splash Pool</button>
<button data-loc="Restaurant">Restaurant</button>
<button data-loc="Strand">Strand</button>
</div>

<div class="viewer">
<iframe src="docs/Campingkaart_HD.pdf" title="Campingkaart"></iframe>
</div>

<div class="card">
<h2>📍 Geselecteerde locatie</h2>
<p id="selected">Nog geen locatie gekozen.</p>
</div>

<div class="card">
<h2>📝 Ontwikkelstatus</h2>
<ul>
<li>✔ HD-kaart geïntegreerd</li>
<li>✔ Locatieselectie voorbereid</li>
<li>⏳ Echte klikbare hotspots volgen zodra een afbeelding/vectorkaart beschikbaar is.</li>
</ul>
</div>

<script src="js/app.js"></script>
</body></html>
