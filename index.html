<!doctype html><html lang='nl'><head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>ReisKompas v90</title>
<link rel='manifest' href='manifest.json'>
<link rel='stylesheet' href='css/style.css'>
</head><body>
<header><h1>ReisKompas v90</h1><div id='count'></div></header>
<nav>
<button onclick="show('dash')">Dashboard</button>
<button onclick="show('route')">Route</button>
<button onclick="show('links')">Kaarten</button>
<button onclick="show('pack')">Paklijst</button>
<button onclick="show('docs')">Docs</button>
</nav>
<main>
<section id="dash">
<div class="card"><h2>Reisstatus</h2><progress id="prog" max="8"></progress><p id="progTxt"></p></div>
<div class="card"><b>Camping Playa Montroig</b><br>2 t/m 16 augustus 2026</div>
</section>

<section id="route" hidden>
<div class="card"><h2>Route</h2><table id="rt"></table></div>
</section>

<section id="links" hidden>
<div class="card"><h2>Snelle kaarten</h2>
<ul>
<li><a target="_blank" href="https://maps.apple.com/?q=La+Jonquera">Hotelomgeving La Jonquera</a></li>
<li><a target="_blank" href="https://maps.apple.com/?q=Camping+Playa+Montroig">Camping Playa Montroig</a></li>
</ul></div>
</section>

<section id="pack" hidden>
<div class="card"><h2>Paklijst</h2><div id="items"></div></div>
</section>

<section id="docs" hidden>
<div class="card"><h2>Documenten</h2>
<p>Voeg hier camping-, hotel- en verzekeringsdocumenten toe.</p>
</div></section>
</main>
<script src="js/app.js"></script>
</body></html>
