<!DOCTYPE html><html lang='nl'><head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>ReisKompas 2.4</title>
<link rel='stylesheet' href='css/style.css'>
</head><body>
<header><h1>🏖️ ReisKompas 2.4</h1><p>Vakantie Spanje 2026</p></header>

<nav>
<button data-page="home">Dashboard</button>
<button data-page="camping">Camping</button>
<button data-page="planning">Planning</button>
<button data-page="restaurants">Restaurants</button>
<button data-page="checklist">Checklist</button>
</nav>

<section id="home" class="page">
<div class="card">
<h2>Aftellen</h2>
<p id="countdown"></p>
</div>
<div class="grid">
<div class="card"><h3>🌡️ Weer</h3><p>Plaatsaanduiding voor toekomstige live weersinformatie.</p></div>
<div class="card"><h3>📍 Bestemming</h3><p>Playa Montroig Camping Resort</p></div>
</div>
</section>

<section id="camping" class="page" hidden>
<div class="card">
<h2>Camping</h2>
<input id="pitch" placeholder="Kampeerplaats">
<button id="savePitch">Kampeerplaats opslaan</button>
<p id="pitchSaved"></p>
</div>
</section>

<section id="planning" class="page" hidden>
<div class="card">
<h2>Dagplanning</h2>
<textarea id="plan" placeholder="Planning voor vandaag..."></textarea>
</div>
</section>

<section id="restaurants" class="page" hidden>
<div class="card">
<h2>Favorieten</h2>
<ul>
<li>La Terrassa</li>
<li>Espai Grill</li>
<li>Pai-Pai Cocktail Bar</li>
<li>Tropical</li>
</ul>
</div>
</section>

<section id="checklist" class="page" hidden>
<div class="card">
<h2>Vertrekchecklist</h2>
<label><input type="checkbox" class="chk" data-k="paspoort"> Paspoorten</label><br>
<label><input type="checkbox" class="chk" data-k="caravan"> Caravan aangekoppeld</label><br>
<label><input type="checkbox" class="chk" data-k="koelkast"> Koelkast aan</label><br>
<label><input type="checkbox" class="chk" data-k="stroom"> Stroomkabel mee</label>
</div>
</section>

<script src="js/app.js"></script>
</body></html>
