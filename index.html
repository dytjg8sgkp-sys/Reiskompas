
<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="assets/css/style.css">
<title>ReisKompas v62</title>
</head>
<body>
<header>
<h1>🇪🇸 ReisKompas v62</h1>
<p>Budgetregistratie</p>
</header>
<main>

<div class="card">
<h2>➕ Nieuwe uitgave</h2>
<select id="category">
<option>Brandstof</option>
<option>Tol</option>
<option>Camping</option>
<option>Boodschappen</option>
<option>Restaurant</option>
<option>Activiteiten</option>
</select><br>
<input id="description" placeholder="Omschrijving"><br>
<input id="amount" type="number" step="0.01" placeholder="Bedrag"><br>
<button onclick="addExpense()">Toevoegen</button>
</div>

<div class="card">
<h2>💶 Uitgaven</h2>
<table>
<thead><tr><th>Categorie</th><th>Omschrijving</th><th>Bedrag</th></tr></thead>
<tbody id="rows"></tbody>
</table>
<h3>Totaal: <span id="total">€ 0.00</span></h3>
</div>

<script src="assets/js/app.js"></script>
</main>
</body>
</html>
